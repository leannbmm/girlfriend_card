<!DOCTYPE html>
<html>
<head>
  <title>Para ti ❤️</title>
  <style>
    body {
      font-family: Arial;
      background: #ffe6f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .contenedor {
      position: relative;
      width: 300px;
      height: 200px;
      cursor: pointer;
    }

    /* Sobre base */
    .sobre {
      width: 100%;
      height: 100%;
      background: #ff4d88;
      position: absolute;
      border-radius: 10px;
    }

    /* Tapa del sobre */
    .tapa {
      width: 100%;
      height: 100%;
      background: #ff66a3;
      position: absolute;
      clip-path: polygon(0 0, 50% 50%, 100% 0);
      transform-origin: top;
      transition: transform 1s;
      border-radius: 10px;
    }

    /* Carta dentro */
    .carta {
  position: absolute;
  width: 90%;
  height: 90%;
  background: white;
  top: 5%;
  left: 5%;
  border-radius: 10px;
  padding: 15px;
  box-sizing: border-box;

  /* 🔴 IMPORTANTE: ocultarla de verdad */
  transform: translateY(120%);
  opacity: 0;

  transition: transform 1s, opacity 0.5s;
  overflow: auto;
}

    /* Estado abierto */
    .abierto .tapa {
      transform: rotateX(180deg);
    }

   .abierto .carta {
  transform: translateY(0);
  opacity: 1;
}

    h1 {
      text-align: center;
      color: #ff4d88;
    }
  </style>
</head>

<body>

  <h1>Para ti 💖</h1>

  <div class="contenedor" onclick="abrirSobre()">
    <div class="sobre"></div>
    <div class="tapa"></div>

    <div class="carta">
      <p>(texto de carta)</p>
      <p>(texto de carta)</p>
      <p>(texto de carta)</p>
    </div>
  </div>

  <script>
    function abrirSobre() {
      document.querySelector(".contenedor").classList.toggle("abierto");
    }
  </script>

</body>
</html>
