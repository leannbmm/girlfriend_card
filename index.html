<!DOCTYPE html>
<html>
<head>
  <title>Para ti ❤️</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 50px;
      background: #ffe6f0;
    }

    h1 { color: #ff4d88; }

    button {
      padding: 10px 20px;
      background: #ff4d88;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    /* Carta */
    .carta {
      max-width: 500px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);

      /* empieza oculta */
      max-height: 0;
      overflow: hidden;
      transition: max-height 1s ease;
    }

    .carta.abierta {
      max-height: 1000px; /* suficiente para mostrar todo */
    }
  </style>
</head>

<body>

  <h1>Para ti 💖</h1>

  <button onclick="abrirCarta()">Abrir carta 💌</button>

  <div id="carta" class="carta">
    <p>(texto de carta)</p>
  </div>

  <script>
    function abrirCarta() {
      document.getElementById("carta").classList.toggle("abierta");
    }
  </script>

</body>
</html>
