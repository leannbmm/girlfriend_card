<!DOCTYPE html>
<html>
<head>
  <title>Para ti ❤️</title>

  <style>
    body {
      font-family: Arial;
      background: #ffe6f0;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    /* 🌸 Fondo fotos */
    .fondo-fotos {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .marco {
      position: absolute;
      width: 140px;
      height: 140px;
      background: white;
      padding: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      border-radius: 10px;
    }

    .marco img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 5px;
    }

    h1 {
      color: #ff4d88;
      z-index: 2;
    }

    /* 💌 Sobre */
    .contenedor {
      position: relative;
      width: 300px;
      height: 200px;
      cursor: pointer;
      overflow: hidden;
      z-index: 2;
    }

    .sobre {
      width: 100%;
      height: 100%;
      background: #ff4d88;
      position: absolute;
      border-radius: 10px;
    }

    .tapa {
      width: 100%;
      height: 100%;
      background: #ff66a3;
      position: absolute;
      clip-path: polygon(0 0, 50% 50%, 100% 0);
      transform-origin: top;
      transition: transform 1s;
      border-radius: 10px;
    }

    .carta {
      position: absolute;
      width: 90%;
      height: 90%;
      background: white;
      top: 5%;
      left: 5%;
      border-radius: 10px;
      padding: 15px;
      box-sizing: border-box;
      transform: translateY(120%);
      opacity: 0;
      transition: transform 1s, opacity 0.5s;
      overflow: auto;
    }

    .abierto .tapa {
      transform: rotateX(180deg);
    }

    .abierto .carta {
      transform: translateY(0);
      opacity: 1;
    }

    /* 💖 Texto */
    .resaltado {
      color: #ff4d88;
      font-weight: bold;
      animation: brillo 2s infinite alternate;
    }

    @keyframes brillo {
      from { text-shadow: 0 0 5px #ff99cc; }
      to { text-shadow: 0 0 20px #ff4d88; }
    }

    .fade {
      opacity: 0;
      animation: aparecer 2s forwards;
    }

    @keyframes aparecer {
      to { opacity: 1; }
    }

    /* 💥 corazones confeti */
    .corazon {
      position: absolute;
      font-size: 20px;
      pointer-events: none;
      animation: explosion 1.5s ease-out forwards;
      z-index: 1;
    }

    @keyframes explosion {
      0% {
        transform: translate(0,0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--x), var(--y)) scale(1.5);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <!-- 🌸 FOTOS DE FONDO -->
  <div class="fondo-fotos">

    <div class="marco" style="top: 40px; left: 30px; transform: rotate(-5deg);">
      <img src="foto1.jpg">
    </div>

    <div class="marco" style="top: 200px; right: 40px; transform: rotate(4deg);">
      <img src="foto2.jpg">
    </div>

    <div class="marco" style="bottom: 50px; left: 120px; transform: rotate(-2deg);">
      <img src="foto3.jpg">
    </div>

  </div>

  <h1>Para ti 💖</h1>

  <!-- 💌 SOBRE -->
  <div class="contenedor" onclick="abrirSobre(event)">
    <div class="sobre"></div>
    <div class="tapa"></div>

    <div class="carta">
      <p class="fade">Hola, guapetona 💖</p>

      <p class="fade">Por fin has acabado el examen, y no sabes cuánto me alegro por ello...</p>

      <p class="fade">
        Eres <span class="resaltado">súper organizada</span>,
        <span class="resaltado">comprometida</span>,
        <span class="resaltado">inteligente</span>,
        <span class="resaltado">guapa</span> y
        <span class="resaltado">graciosa</span>.
      </p>

      <p class="fade">
        <strong class="resaltado">Eres el amor de mi vida, Sarah Bachiller.</strong>
      </p>

      <p class="fade">
        Te quiero ❤️
      </p>
    </div>
  </div>

  <script>
    function abrirSobre(e) {
      document.querySelector(".contenedor").classList.toggle("abierto");
      explotarCorazones(e);
    }

    function explotarCorazones(e) {
      for (let i = 0; i < 25; i++) {
        let corazon = document.createElement("div");
        corazon.className = "corazon";
        corazon.innerHTML = "❤️";

        let x = (Math.random() - 0.5) * 600 + "px";
        let y = (Math.random() - 0.5) * 600 + "px";

        corazon.style.setProperty('--x', x);
        corazon.style.setProperty('--y', y);

        corazon.style.left = e.clientX + "px";
        corazon.style.top = e.clientY + "px";

        document.body.appendChild(corazon);

        setTimeout(() => {
          corazon.remove();
        }, 1500);
      }
    }
  </script>

</body>
</html>
